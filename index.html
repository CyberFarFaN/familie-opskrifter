<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Opskrifter">
<meta name="theme-color" content="#faf8f5">
<title>Familieopskrifter</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#faf8f5; --surface:#ffffff; --surface2:#f3f0eb; --border:#e8e2d9;
  --accent:#c0392b; --accent2:#e67e22; --text:#1a1208; --muted:#7a6e62;
  --dim:#b0a89e; --shadow:0 2px 20px rgba(0,0,0,.08);
  --safe-top:env(safe-area-inset-top); --safe-bottom:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
.screen{display:none;flex-direction:column;min-height:100dvh}
.screen.active{display:flex}

/* HEADER */
.hdr{background:var(--bg);padding:calc(12px + var(--safe-top)) 20px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.hdr-inner{display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-family:'Lora',serif;font-size:22px;color:var(--text);letter-spacing:-.3px}
.hdr-logo span{color:var(--accent)}
.hdr-back{display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--accent);font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;cursor:pointer;padding:6px 0}
.hdr-back svg{width:18px;height:18px}
.hdr-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;display:flex;align-items:center;transition:color .2s}
.hdr-btn:active{color:var(--accent)}
.hdr-btn svg{width:22px;height:22px}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;padding-bottom:calc(72px + var(--safe-bottom));-webkit-overflow-scrolling:touch}

/* HOME HERO */
.home-hero{padding:28px 20px 20px;background:var(--bg)}
.home-eyebrow{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.home-title{font-family:'Lora',serif;font-size:32px;line-height:1.2;color:var(--text);margin-bottom:4px}
.home-title em{font-style:italic;color:var(--muted)}
.home-sub{font-size:13px;color:var(--muted)}

/* SEARCH */
.search-wrap{padding:0 20px 16px}
.search-box{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;display:flex;align-items:center;gap:10px;padding:12px 16px;box-shadow:var(--shadow)}
.search-box svg{width:16px;height:16px;color:var(--dim);flex-shrink:0}
.search-box input{background:none;border:none;outline:none;font-family:'Nunito',sans-serif;font-size:15px;color:var(--text);flex:1}
.search-box input::placeholder{color:var(--dim)}

/* RECIPE GRID */
.sec-label{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);padding:4px 20px 12px}
.recipe-grid{padding:0 20px;display:grid;grid-template-columns:1fr;gap:18px}
@media(min-width:600px){.recipe-grid{grid-template-columns:1fr 1fr}}

/* RECIPE CARD */
.card{background:var(--surface);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .2s,box-shadow .2s;border:1px solid var(--border)}
.card:active{transform:scale(.98);box-shadow:0 1px 8px rgba(0,0,0,.06)}
.card-img{width:100%;height:200px;object-fit:cover;display:block;background:var(--surface2)}
.card-img-wrap{position:relative;overflow:hidden;height:200px;background:var(--surface2)}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.card:active .card-img-wrap img{transform:scale(1.03)}
.card-img-placeholder{width:100%;height:200px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--surface2) 0%,var(--border) 100%);font-size:48px}
.card-body{padding:16px}
.card-cat{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.card-title{font-family:'Lora',serif;font-size:18px;line-height:1.3;color:var(--text);margin-bottom:6px}
.card-desc{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:14px}
.meta-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--dim);font-weight:600}
.meta-item svg{width:12px;height:12px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--dim)}

/* FAB */
.fab{position:fixed;bottom:calc(16px + var(--safe-bottom));right:20px;width:52px;height:52px;background:var(--accent);border:none;border-radius:26px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(192,57,43,.4);z-index:200;transition:transform .2s}
.fab:active{transform:scale(.92)}
.fab svg{width:22px;height:22px}

/* DETAIL */
.detail-img-wrap{position:relative;height:280px;overflow:hidden;background:var(--surface2)}
.detail-img-wrap img{width:100%;height:100%;object-fit:cover}
.detail-img-placeholder{width:100%;height:280px;display:flex;align-items:center;justify-content:center;font-size:72px;background:linear-gradient(135deg,var(--surface2),var(--border))}
.detail-img-overlay{position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(transparent,rgba(250,248,245,.95))}
.detail-body{padding:20px}
.detail-cat{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.detail-title{font-family:'Lora',serif;font-size:26px;line-height:1.2;color:var(--text);margin-bottom:8px}
.detail-desc{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:16px}
.detail-meta{display:flex;gap:12px;flex-wrap:wrap;padding-bottom:16px;border-bottom:1px solid var(--border)}
.meta-pill{background:var(--surface2);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:5px}
.meta-pill svg{width:12px;height:12px}

/* PORTIONS */
.portions-bar{display:flex;align-items:center;gap:16px;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.portions-label{font-size:13px;color:var(--muted);font-weight:600;flex:1}
.portions-ctrl{display:flex;align-items:center;gap:14px}
.p-btn{width:32px;height:32px;border-radius:16px;background:var(--surface2);border:1.5px solid var(--border);color:var(--accent);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600}
.p-btn:active{background:var(--border)}
.p-count{font-family:'Lora',serif;font-size:22px;color:var(--accent);min-width:28px;text-align:center}

/* TABS */
.tabs{display:flex;border-bottom:1.5px solid var(--border);background:var(--bg);position:sticky;top:62px;z-index:50}
.tab{flex:1;padding:13px 8px;background:none;border:none;border-bottom:2.5px solid transparent;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;transition:all .2s;margin-bottom:-1.5px}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none;padding:20px}
.tab-content.active{display:block}

/* INGREDIENTS */
.ing-section-title{font-family:'Lora',serif;font-size:16px;color:var(--text);margin-bottom:14px}
.ing-list{display:flex;flex-direction:column}
.ing-item{display:flex;align-items:baseline;gap:14px;padding:11px 0;border-bottom:1px solid var(--border)}
.ing-item:last-child{border-bottom:none}
.ing-amount{font-weight:700;color:var(--accent);min-width:72px;font-size:14px;flex-shrink:0}
.ing-name{font-size:14px;color:var(--text);line-height:1.4}

/* STEPS */
.step-list{display:flex;flex-direction:column;gap:20px}
.step-item{display:flex;gap:14px}
.step-num{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-title{font-weight:700;font-size:14px;color:var(--text);margin-bottom:4px}
.step-text{font-size:14px;color:var(--muted);line-height:1.7}

/* NOTES */
.notes-box{background:linear-gradient(135deg,#fdf3f2,#fef9f5);border:1px solid #f0d5d0;border-left:3px solid var(--accent);border-radius:12px;padding:16px}
.notes-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.note-item{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:6px}
.note-item:last-child{margin-bottom:0}

/* ACTIONS */
.action-row{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--border);background:var(--bg)}
.act-btn{flex:1;padding:13px 8px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;color:var(--muted);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.act-btn:active{background:var(--surface2)}
.act-btn svg{width:16px;height:16px}
.act-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.act-btn.primary:active{opacity:.85}

/* SHOP */
.shop-hero{padding:24px 20px 16px;border-bottom:1px solid var(--border)}
.shop-hero-title{font-family:'Lora',serif;font-size:24px;color:var(--text);margin-bottom:3px}
.shop-hero-sub{font-size:13px;color:var(--muted)}
.shop-list-wrap{padding:0 20px}
.shop-date-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);padding:16px 0 8px}
.shop-item{display:flex;align-items:flex-start;gap:14px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer}
.shop-item:last-child{border-bottom:none}
.shop-check{width:24px;height:24px;border-radius:12px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px}
.shop-item.checked .shop-check{background:var(--accent);border-color:var(--accent)}
.shop-item.checked .shop-check::after{content:'';width:5px;height:9px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg) translateY(-1px)}
.shop-name{font-size:15px;color:var(--text);font-weight:600;transition:color .2s}
.shop-amt{font-size:13px;color:var(--accent);font-weight:600;margin-top:2px}
.shop-src{font-size:12px;color:var(--dim);margin-top:1px}
.shop-item.checked .shop-name{color:var(--dim);text-decoration:line-through;font-weight:400}
.shop-empty{text-align:center;padding:60px 20px;color:var(--dim)}
.shop-empty svg{width:48px;height:48px;opacity:.25;display:block;margin:0 auto 12px}

/* EDIT */
.form-sec{padding:18px 20px;border-bottom:1px solid var(--border)}
.form-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.form-input,.form-textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-family:'Nunito',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border-color .2s}
.form-input:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{min-height:75px;resize:vertical}
.ing-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.ing-row .form-input:nth-child(1){width:78px;flex:none}
.ing-row .form-input:nth-child(2){width:68px;flex:none}
.ing-row .form-input:nth-child(3){flex:1}
.step-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.step-row-inner{flex:1;display:flex;flex-direction:column;gap:6px}
.step-row-inner .form-input{width:100%}
.rm-btn{width:30px;height:30px;border-radius:15px;background:#fdf2f2;border:1.5px solid #f5c6c6;color:var(--accent);font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:3px}
.add-row-btn{background:none;border:1.5px dashed var(--border);border-radius:12px;padding:11px;width:100%;color:var(--dim);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.add-row-btn:active{border-color:var(--accent);color:var(--accent)}
.save-btn{margin:18px 20px;padding:16px;background:var(--accent);border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:#fff;cursor:pointer;width:calc(100% - 40px)}
.save-btn:active{opacity:.85}
.del-btn{margin:0 20px 20px;padding:14px;background:none;border:1.5px solid #f5c6c6;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;color:var(--accent);cursor:pointer;width:calc(100% - 40px)}

/* BOTTOM NAV */
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
.nav-item{flex:1;padding:10px 8px 12px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--dim);transition:color .2s}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px}
.nav-item span{font-size:10px;font-weight:700;letter-spacing:.5px}

/* TOAST */
.toast{position:fixed;bottom:calc(82px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);border-radius:22px;padding:10px 18px;font-size:13px;font-weight:600;color:#fff;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* DIVIDER */
.divider{height:1px;background:var(--border);margin:0 20px}
</style>
</head>
<body>

<!-- HOME -->
<div id="homeScreen" class="screen active">
  <div class="hdr">
    <div class="hdr-inner">
      <div class="hdr-logo">Familie<span>opskrifter</span></div>
    </div>
  </div>
  <div class="scroll">
    <div class="home-hero">
      <div class="home-eyebrow">Vores kogebog</div>
      <div class="home-title">Hvad skal der<br><em>laves i dag?</em></div>
      <div class="home-sub" id="recipeCount">Indlæser…</div>
    </div>
    <div class="search-wrap">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="searchInput" placeholder="Søg i opskrifter…" oninput="renderHome()">
      </div>
    </div>
    <div class="sec-label">Alle opskrifter</div>
    <div class="recipe-grid" id="recipeList"></div>
    <div style="height:8px"></div>
  </div>
  <button class="fab" onclick="openNew()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <nav class="bot-nav">
    <button class="nav-item active" onclick="showScreen('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>Hjem</span>
    </button>
    <button class="nav-item" onclick="showScreen('shop')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span>Indkøb</span>
    </button>
  </nav>
</div>

<!-- DETAIL -->
<div id="detailScreen" class="screen">
  <div class="hdr">
    <div class="hdr-inner">
      <button class="hdr-back" onclick="showScreen('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>Tilbage
      </button>
      <button class="hdr-btn" id="editBtn" onclick="openEdit(currentId)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>
  </div>
  <div class="scroll" id="detailContent"></div>
  <div class="action-row" id="detailActions"></div>
</div>

<!-- SHOP -->
<div id="shopScreen" class="screen">
  <div class="hdr">
    <div class="hdr-inner">
      <div class="hdr-logo">Indkøbs<span>liste</span></div>
      <button class="hdr-btn" onclick="clearChecked()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>
  </div>
  <div class="scroll">
    <div class="shop-hero">
      <div class="shop-hero-sub" id="shopCount">Ingen varer endnu</div>
    </div>
    <div class="shop-list-wrap" id="shopList"></div>
  </div>
  <nav class="bot-nav">
    <button class="nav-item" onclick="showScreen('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span>Hjem</span>
    </button>
    <button class="nav-item active" onclick="showScreen('shop')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span>Indkøb</span>
    </button>
  </nav>
</div>

<!-- EDIT -->
<div id="editScreen" class="screen">
  <div class="hdr">
    <div class="hdr-inner">
      <button class="hdr-back" id="editBackBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15,18 9,12 15,6"/></svg>Annuller
      </button>
      <div class="hdr-logo" id="editTitle">Ny <span>opskrift</span></div>
    </div>
  </div>
  <div class="scroll">
    <div class="form-sec">
      <div class="form-label">Navn</div>
      <input type="text" class="form-input" id="eName" placeholder="Opskriftens navn">
    </div>
    <div class="form-sec">
      <div class="form-label">Beskrivelse</div>
      <textarea class="form-textarea" id="eDesc" placeholder="Kort beskrivelse…"></textarea>
    </div>
    <div class="form-sec" style="display:flex;gap:14px">
      <div style="flex:1">
        <div class="form-label">Portioner</div>
        <input type="number" class="form-input" id="ePortions" value="4" min="1" style="width:90px">
      </div>
      <div style="flex:2">
        <div class="form-label">Tid</div>
        <input type="text" class="form-input" id="eTime" placeholder="f.eks. 30 min">
      </div>
    </div>
    <div class="form-sec">
      <div class="form-label">Kategori (til billedsøgning)</div>
      <input type="text" class="form-input" id="eCat" placeholder="f.eks. gryderet, vafler, pasta…">
    </div>
    <div class="form-sec">
      <div class="form-label">Ingredienser</div>
      <div id="ingList"></div>
      <button class="add-row-btn" onclick="addIng()">+ Tilføj ingrediens</button>
    </div>
    <div class="form-sec">
      <div class="form-label">Fremgangsmåde</div>
      <div id="stepList"></div>
      <button class="add-row-btn" onclick="addStep()">+ Tilføj trin</button>
    </div>
    <div class="form-sec">
      <div class="form-label">Noter (valgfrit)</div>
      <textarea class="form-textarea" id="eNotes" placeholder="Tips, varianter…" style="min-height:90px"></textarea>
    </div>
    <button class="save-btn" onclick="saveRecipe()">Gem opskrift</button>
    <button class="del-btn" id="delBtn" style="display:none" onclick="deleteRecipe()">Slet opskrift</button>
    <div style="height:20px"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK='opskrifter_v5', SHK='indkoeb_v3';

// Unsplash source - free, no API key needed
function imgUrl(query, id) {
  const seed = id || query;
  const q = encodeURIComponent(query || 'food cooking');
  return `https://source.unsplash.com/800x600/?${q}&sig=${seed}`;
}

const EMOJIS = {gryderet:'🍲',vafler:'🧇',pasta:'🍝',kage:'🎂',suppe:'🥣',salat:'🥗',fisk:'🐟',kylling:'🍗',pizza:'🍕'};

let recipes=[], shopItems=[], currentId=null, currentPortions=4, editingId=null;

function load(){
  try{
    const r=localStorage.getItem(SK);
    recipes=r?JSON.parse(r):JSON.parse(JSON.stringify(DEFAULTS));
    const s=localStorage.getItem(SHK);
    shopItems=s?JSON.parse(s):[];
  }catch(e){recipes=JSON.parse(JSON.stringify(DEFAULTS));shopItems=[];}
}
function save(){
  localStorage.setItem(SK,JSON.stringify(recipes));
  localStorage.setItem(SHK,JSON.stringify(shopItems));
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const map={home:'homeScreen',detail:'detailScreen',shop:'shopScreen',edit:'editScreen'};
  document.getElementById(map[name]).classList.add('active');
  if(name==='home')renderHome();
  if(name==='shop')renderShop();
  window.scrollTo(0,0);
}

function getCatLabel(cat){
  if(!cat)return'Opskrift';
  return cat.split(' ')[0].charAt(0).toUpperCase()+cat.split(' ')[0].slice(1);
}

function renderHome(){
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  const filtered=recipes.filter(r=>r.name.toLowerCase().includes(q)||(r.desc||'').toLowerCase().includes(q));
  document.getElementById('recipeCount').textContent=recipes.length+' opskrifter gemt';
  const list=document.getElementById('recipeList');
  if(!filtered.length){list.innerHTML='<div class="empty" style="grid-column:1/-1"><p>Ingen opskrifter fundet</p></div>';return;}
  list.innerHTML=filtered.map(r=>{
    const imgSrc=imgUrl(r.cat||r.name, r.id);
    return`<div class="card" onclick="openRecipe('${r.id}')">
      <div class="card-img-wrap">
        <img src="${imgSrc}" alt="${r.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\"card-img-placeholder\\">${getEmoji(r.cat)}</div>'">
      </div>
      <div class="card-body">
        <div class="card-cat">${getCatLabel(r.cat)}</div>
        <div class="card-title">${r.name}</div>
        ${r.desc?`<div class="card-desc">${r.desc}</div>`:''}
        <div class="card-meta">
          <div class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>${r.portions} pers.</div>
          ${r.time?`<div class="meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${r.time}</div>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function openRecipe(id){
  currentId=id;
  const r=recipes.find(x=>x.id===id);
  if(!r)return;
  currentPortions=r.portions;
  renderDetail(r);
  showScreen('detail');
}

function scaleAmt(amount,ratio){
  if(!amount)return'';
  const n=parseFloat(amount);
  if(isNaN(n))return amount;
  const s=n*ratio;
  return s%1===0?s.toString():s.toFixed(1).replace(/\.0$/,'');
}

    <div class="detail-img-wrap">

        ${r.time?`<div class="meta-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:12px;height:12px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${r.time}</div>`:''}
      </div>

    <div class="portions-bar">
      <div class="portions-label">Juster portioner</div>

  document.getElementById('detailActions').innerHTML=`
    <button class="act-btn" onclick="addToShop('${r.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      Til indkøb
    </button>
    <button class="act-btn primary" onclick="printRecipe('${r.id}')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>

function changePortions(d){
  const r=recipes.find(x=>x.id===currentId);
  if(!r)return;
  currentPortions=Math.max(1,currentPortions+d);
  document.getElementById('pCount').textContent=currentPortions;
  const ratio=currentPortions/r.portions;
  const el=document.getElementById('tab-ing');
  if(el)el.innerHTML='<div class="ing-section-title">Du skal bruge</div><div class="ing-list">'+r.ingredients.map(i=>`
    <div class="ing-item">
      <span class="ing-amount">${scaleAmt(i.amount,ratio)}${i.unit?' '+i.unit:''}</span>
      <span class="ing-name">${i.name}</span>
    </div>`).join('')+'</div>';
}

function switchTab(name,btn){
  document.querySelectorAll('#detailContent .tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('#detailContent .tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

    <td style="color:#c0392b;font-weight:700;padding:8px 16px 8px 0;border-bottom:1px solid #eee;white-space:nowrap;font-size:14px">${scaleAmt(i.amount,ratio)}${i.unit?' '+i.unit:''}</td>
    <td style="padding:8px 0;border-bottom:1px solid #eee;font-size:14px;color:#333">${i.name}</td>
  </tr>`).join('');
  const steps=r.steps.map((s,i)=>`
    <div style="display:flex;gap:14px;margin-bottom:18px;align-items:flex-start">
      <div style="min-width:28px;height:28px;border-radius:50%;background:#c0392b;color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</div>
      <div><div style="font-weight:700;font-size:14px;margin-bottom:4px;color:#1a1208">${s.title}</div><div style="font-size:14px;color:#555;line-height:1.7">${s.text}</div></div>
    </div>`).join('');
  const notes=r.notes?`<div style="margin-top:28px;border-left:3px solid #c0392b;padding:14px 18px;background:#fdf3f2;border-radius:6px">
    <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#c0392b;margin-bottom:10px">Noter & tips</div>
    ${r.notes.split('\n\n').map(n=>`<p style="font-size:13px;color:#666;margin:0 0 6px;line-height:1.6">${n}</p>`).join('')}
  </div>`:'';

  const html=`<!DOCTYPE html><html lang="da"><head>
  <meta charset="UTF-8"><title>${r.name}</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Nunito',sans-serif;max-width:700px;margin:0 auto;padding:0;color:#1a1208}
    h1{font-family:'Lora',serif;font-size:28px;margin:0 0 6px;line-height:1.2}
    h2{font-family:'Lora',serif;font-size:18px;color:#c0392b;margin:28px 0 14px;padding-bottom:6px;border-bottom:2px solid #f0e8e5}
    .hero{position:relative;height:220px;overflow:hidden;margin-bottom:0}
    .hero img{width:100%;height:100%;object-fit:cover}
    .hero-overlay{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,rgba(250,248,245,1))}
    .body{padding:20px 28px 32px}
    .cat{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#c0392b;margin-bottom:6px}
    .desc{color:#666;font-size:14px;line-height:1.6;margin-bottom:12px}
    .meta{display:flex;gap:16px;font-size:13px;color:#999;font-weight:600;margin-bottom:4px}
    @media print{.no-print{display:none!important}}
  </style>
  </head><body>
  <div class="hero"><img src="${imgSrc}" alt="${r.name}" onerror="this.style.display='none'"><div class="hero-overlay"></div></div>
  <div class="body">
    <div class="cat">${getCatLabel(r.cat)}</div>
    <h1>${r.name}</h1>
    ${r.desc?`<div class="desc">${r.desc}</div>`:''}
    <div class="meta"><span>👥 ${currentPortions} portioner</span>${r.time?`<span>⏱ ${r.time}</span>`:''}</div>
    <h2>Ingredienser</h2>

    <h2>Fremgangsmåde</h2>${steps}${notes}
    <div class="no-print" style="margin-top:32px;padding-top:20px;border-top:1px solid #eee">
      <button onclick="window.print()" style="background:#c0392b;color:#fff;border:none;padding:12px 26px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif">
        Udskriv / Gem som PDF

  const w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();}
  else showToast('Tillad popups for at printe');

function addToShop(id){
  const r=recipes.find(x=>x.id===id);
  if(!r)return;
  const ratio=currentPortions/r.portions;
  r.ingredients.forEach(i=>{
    if(!i.name)return;
    shopItems.push({id:Date.now()+Math.random(),name:i.name,amount:i.amount?scaleAmt(i.amount,ratio)+(i.unit?' '+i.unit:''):'',source:r.name,checked:false});
  });
  save();showToast(r.ingredients.length+' ingredienser tilføjet');
}

function renderShop(){
  const el=document.getElementById('shopList');
  const cnt=document.getElementById('shopCount');
  if(!shopItems.length){
    cnt.textContent='Ingen varer endnu';
    el.innerHTML=`<div class="shop-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <p style="font-size:15px;font-weight:600;margin-bottom:4px">Listen er tom</p>
      <p style="font-size:13px">Åbn en opskrift og tryk "Til indkøb"</p>
    </div>`;
    return;
  }
  const remaining=shopItems.filter(x=>!x.checked).length;
  cnt.textContent=remaining+' varer tilbage';
  el.innerHTML=shopItems.map(item=>`
    <div class="shop-item ${item.checked?'checked':''}" onclick="toggleShop('${item.id}')">
      <div class="shop-check"></div>
      <div>
        <div class="shop-name">${item.name}</div>
        ${item.amount?`<div class="shop-amt">${item.amount}</div>`:''}
        <div class="shop-src">${item.source}</div>
      </div>
    </div>`).join('');
}

function toggleShop(id){
  const item=shopItems.find(x=>String(x.id)===String(id));
  if(item){item.checked=!item.checked;save();renderShop();}
}

function clearChecked(){
  const b=shopItems.length;
  shopItems=shopItems.filter(x=>!x.checked);
  save();renderShop();
  if(b!==shopItems.length)showToast('Afkrydsede varer fjernet');
}

function openNew(){
  editingId=null;
  document.getElementById('editTitle').innerHTML='Ny <span>opskrift</span>';
  document.getElementById('editBackBtn').onclick=()=>showScreen('home');
  ['eName','eDesc','eTime','eCat','eNotes'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('ePortions').value=4;
  document.getElementById('delBtn').style.display='none';
  document.getElementById('ingList').innerHTML='';
  document.getElementById('stepList').innerHTML='';
  addIng();addIng();addIng();addStep();addStep();
  showScreen('edit');
}

function openEdit(id){
  editingId=id;
  const r=recipes.find(x=>x.id===id);
  if(!r)return;
  document.getElementById('editTitle').innerHTML='Rediger <span>opskrift</span>';
  document.getElementById('editBackBtn').onclick=()=>openRecipe(id);
  document.getElementById('eName').value=r.name;
  document.getElementById('eDesc').value=r.desc||'';
  document.getElementById('ePortions').value=r.portions;
  document.getElementById('eTime').value=r.time||'';
  document.getElementById('eCat').value=r.cat||'';
  document.getElementById('eNotes').value=r.notes||'';
  document.getElementById('delBtn').style.display='block';
  document.getElementById('ingList').innerHTML='';
  document.getElementById('stepList').innerHTML='';
  r.ingredients.forEach(i=>addIng(i.amount,i.unit,i.name));
  r.steps.forEach(s=>addStep(s.title,s.text));
  showScreen('edit');
}

  const d=document.createElement('div');d.className='ing-row';
  d.innerHTML=`<input type="text" class="form-input i-amt" placeholder="Mængde" value="${amount}" inputmode="decimal">
    <input type="text" class="form-input i-unit" placeholder="Enhed" value="${unit}">
    <input type="text" class="form-input i-name" placeholder="Ingrediens" value="${name}">
    <button class="rm-btn" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('ingList').appendChild(d);
}

function addStep(title='',text=''){
  const d=document.createElement('div');d.className='step-row';
  d.innerHTML=`<div class="step-row-inner">
    <input type="text" class="form-input s-title" placeholder="Overskrift" value="${title}">
    <textarea class="form-textarea s-text" placeholder="Beskriv trinnet…">${text}</textarea>
  </div>
  <button class="rm-btn" onclick="this.parentElement.remove()">×</button>`;
  document.getElementById('stepList').appendChild(d);
}

function saveRecipe(){
  const name=document.getElementById('eName').value.trim();
  if(!name){showToast('Opskriften mangler et navn');return;}
  const ingredients=[...document.querySelectorAll('#ingList .ing-row')]
    .map(r=>({amount:r.querySelector('.i-amt').value.trim(),unit:r.querySelector('.i-unit').value.trim(),name:r.querySelector('.i-name').value.trim()}))
    .filter(i=>i.name);
  const steps=[...document.querySelectorAll('#stepList .step-row')]
    .map(r=>({title:r.querySelector('.s-title').value.trim(),text:r.querySelector('.s-text').value.trim()}))
    .filter(s=>s.text);
  const recipe={
    id:editingId||('r'+Date.now()),name,
    cat:document.getElementById('eCat').value.trim(),
    desc:document.getElementById('eDesc').value.trim(),
    portions:parseInt(document.getElementById('ePortions').value)||4,
    time:document.getElementById('eTime').value.trim(),
    notes:document.getElementById('eNotes').value.trim(),
    ingredients,steps
  };
  if(editingId){const i=recipes.findIndex(x=>x.id===editingId);if(i>=0)recipes[i]=recipe;}
  else recipes.push(recipe);
  save();showToast('Opskrift gemt');currentId=recipe.id;openRecipe(recipe.id);
}

function deleteRecipe(){
  if(!confirm('Slet denne opskrift?'))return;
  recipes=recipes.filter(x=>x.id!==editingId);
  save();showToast('Opskrift slettet');showScreen('home');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

load();renderHome();
</script>
</body>
</html>
